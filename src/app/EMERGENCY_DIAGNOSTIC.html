<!DOCTYPE html>
<html>
<head>
  <title>StudyCopilot Emergency Diagnostic</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1a1a1a;
      color: #00ff00;
    }
    .test { margin: 10px 0; padding: 10px; background: #2a2a2a; }
    .success { color: #00ff00; }
    .error { color: #ff0000; }
    .warning { color: #ffaa00; }
    button {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    button:hover { background: #00dd00; }
    #output { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🔧 StudyCopilot Emergency Diagnostic</h1>
  <p>Use this to diagnose why modules are stuck</p>

  <button onclick="runFullDiagnostic()">🚀 Run Full Diagnostic</button>
  <button onclick="testAPI()">🧪 Test Gemini API</button>
  <button onclick="checkProvider()">🔍 Check Provider</button>
  <button onclick="clearData()">⚠️ Clear All Data</button>

  <div id="output"></div>

  <script>
    const log = (msg, type = 'info') => {
      const output = document.getElementById('output');
      const className = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
      output.innerHTML += `<div class="test ${className}">${msg}</div>`;
      console.log(msg);
    };

    async function runFullDiagnostic() {
      document.getElementById('output').innerHTML = '';
      log('🔍 Starting Full Diagnostic...', 'info');
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
      
      await checkProvider();
      await checkAPIKey();
      await checkSubjects();
      await testAPI();
      await checkConsole();
      
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
      log('✅ Diagnostic Complete!', 'success');
    }

    function checkProvider() {
      log('\n📍 Step 1: Checking AI Provider...', 'info');
      const provider = localStorage.getItem('ai_provider') || 'gemini';
      log(`Provider: ${provider}`, provider === 'gemini' ? 'success' : 'warning');
      
      if (provider !== 'gemini') {
        log('⚠️ You are not using Gemini! This might be why modules are stuck.', 'warning');
        log('💡 Fix: Switch to Gemini in AI Config dialog', 'warning');
      }
      return provider;
    }

    function checkAPIKey() {
      log('\n📍 Step 2: Checking API Key...', 'info');
      const apiKey = localStorage.getItem('gemini_api_key');
      
      if (!apiKey) {
        log('❌ No API key found!', 'error');
        log('💡 Fix: Click AI Config and add your Gemini API key', 'warning');
        return false;
      }
      
      log(`✅ API Key exists (length: ${apiKey.length})`, 'success');
      
      if (apiKey.length < 30) {
        log('⚠️ API key seems too short. It should be ~39 characters.', 'warning');
        return false;
      }
      
      return true;
    }

    function checkSubjects() {
      log('\n📍 Step 3: Checking Subjects Data...', 'info');
      const subjects = localStorage.getItem('studycopilot_subjects');
      
      if (!subjects) {
        log('⚠️ No subjects data found', 'warning');
        return;
      }
      
      try {
        const data = JSON.parse(subjects);
        log(`✅ Found ${data.length} subjects`, 'success');
        
        data.forEach(subject => {
          log(`\n📚 Subject: ${subject.title}`, 'info');
          subject.units.forEach(unit => {
            log(`  📄 Unit: ${unit.title}`, 'info');
            
            if (unit.content) {
              log(`    ✅ Has markdown: ${unit.content.markdown ? 'Yes' : 'No'}`, 
                  unit.content.markdown ? 'success' : 'error');
              
              if (unit.content.modules) {
                Object.keys(unit.content.modules).forEach(moduleName => {
                  const module = unit.content.modules[moduleName];
                  log(`    📦 ${moduleName}: ${module.status} ${module.progress || 0}%`, 
                      module.status === 'completed' ? 'success' : 
                      module.status === 'error' ? 'error' : 'warning');
                  
                  if (module.error) {
                    log(`      ❌ Error: ${module.error}`, 'error');
                  }
                });
              }
            }
          });
        });
      } catch (error) {
        log(`❌ Error parsing subjects data: ${error}`, 'error');
      }
    }

    async function testAPI() {
      log('\n📍 Step 4: Testing Gemini API...', 'info');
      const apiKey = localStorage.getItem('gemini_api_key');
      
      if (!apiKey) {
        log('❌ Cannot test - no API key', 'error');
        return false;
      }
      
      log('📡 Sending test request to Gemini...', 'info');
      
      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: 'Say "API WORKS" if you can read this.' }]
              }]
            })
          }
        );
        
        log(`Response Status: ${response.status}`, response.ok ? 'success' : 'error');
        
        if (!response.ok) {
          const errorText = await response.text();
          log(`❌ API Error: ${errorText}`, 'error');
          
          if (response.status === 429) {
            log('💡 Fix: Wait 10-15 minutes for rate limit to reset', 'warning');
          } else if (response.status === 400) {
            log('💡 Fix: Get a new API key from https://aistudio.google.com/app/apikey', 'warning');
          }
          return false;
        }
        
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        log(`✅ API Response: ${text}`, 'success');
        log('🎉 Gemini API is working correctly!', 'success');
        return true;
        
      } catch (error) {
        log(`❌ API Test Failed: ${error}`, 'error');
        log('💡 Check your internet connection', 'warning');
        return false;
      }
    }

    function checkConsole() {
      log('\n📍 Step 5: Console Check...', 'info');
      log('👉 Now check your browser console (F12) for these messages:', 'info');
      log('   - "⏱️ Processing modules SEQUENTIALLY..."', 'info');
      log('   - "🚀 Processing: [module name]"', 'info');
      log('   - "🔄 [module] generation - Attempt X/Y"', 'info');
      log('   - Any error messages in red', 'info');
      log('\nIf you see NO messages, the background processing never started!', 'warning');
    }

    function clearData() {
      if (!confirm('⚠️ WARNING: This will delete ALL your subjects and units!\n\nAre you sure?')) {
        return;
      }
      
      log('\n🗑️ Clearing all data...', 'warning');
      localStorage.clear();
      log('✅ All data cleared', 'success');
      log('🔄 Refresh the page and log in again', 'info');
    }
  </script>
</body>
</html>
